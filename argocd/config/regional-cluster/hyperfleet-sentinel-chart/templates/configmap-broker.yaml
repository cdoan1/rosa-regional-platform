apiVersion: v1
kind: ConfigMap
metadata:
  name: hyperfleet-sentinel-broker-config
  namespace: {{ .Values.hyperfleetSentinelChart.targetNamespace }}
  labels:
    app.kubernetes.io/name: hyperfleet-sentinel
    app.kubernetes.io/instance: hyperfleet-sentinel
    app.kubernetes.io/component: broker-config
data:
  broker.yaml: |
    # Broker configuration for hyperfleet-broker library
    broker:
      type: rabbitmq
      rabbitmq:
        url: "amqps://placeholder:placeholder@localhost:5671/"
        exchange: "hyperfleet"
        routing_key: "clusters"
        exchange_type: "topic"

    subscriber:
      parallelism: 1

    # Set to true for debugging broker configuration
    log_config: false
